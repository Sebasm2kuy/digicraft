<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Premium — DigiCraft Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0A0A0A;
            --surface: #171717;
            --accent: #D4AF37;
            --text: #EDEDED;
            --muted: #888888;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 2.5rem;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212, 175, 55, 0.04);
            animation: pulse-border 3s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(212, 175, 55, 0.2); }
            50% { border-color: rgba(212, 175, 55, 0.45); }
        }

        .icon-wrap iconify-icon {
            font-size: 2rem;
            color: var(--accent);
        }

        .project-label {
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .coming-soon {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, #F5E6A3 50%, var(--accent) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .description {
            font-size: 1rem;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: var(--accent);
            margin: 0 auto 3rem;
            opacity: 0.5;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Manrope', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(136, 136, 136, 0.2);
            border-radius: 100px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-link:hover {
            color: var(--accent);
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-2px);
        }

        .back-link iconify-icon {
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        .back-link:hover iconify-icon {
            transform: translateX(-4px);
        }

        .brand {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Syne', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(136, 136, 136, 0.4);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrap">
            <iconify-icon icon="solar:bag-4-bold-duotone"></iconify-icon>
        </div>

        <p class="project-label">DigiCraft Studio — Proyecto</p>
        <h1>E-Commerce Premium</h1>

        <p class="coming-soon">Próximamente</p>

        <p class="description">
            Tienda online de alto rendimiento con diseño boutique, checkout optimizado y una experiencia de compra que convierte visitantes en clientes fieles.
        </p>

        <div class="divider"></div>

        <a href="../#portfolio" class="back-link">
            <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
            Volver al Portfolio
        </a>
    </div>

    <div class="brand">DigiCraft Studio</div>

</body>
</html>
