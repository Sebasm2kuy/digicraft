<script>
(function(){
  // ===== AUTO-LOGIN BYPASS =====
  localStorage.setItem("digicraft_session","admin_default");
  var users=JSON.parse(localStorage.getItem("digicraft_users")||"[]");
  if(!users.some(function(u){return u.id==="admin_default";})){
    users.push({id:"admin_default",username:"admin",password:"admin123",displayName:"Administrador",role:"ADMIN",createdAt:new Date().toISOString()});
    localStorage.setItem("digicraft_users",JSON.stringify(users));
  }
  localStorage.setItem("digicraft_operator_name","Administrador");

  // ===== SEED RANDOM DATA (correct format for the app) =====
  if(!localStorage.getItem("digicraft_seeded_v2")){
    var clients=["Transportes R\u00e1pidos S.A.","Log\u00edstica del Sur","Alimentos del Litoral","Fr\u00edos Patag\u00f3nicos","Distribuidora Nacional","Cereales del Norte","Exportadora Premium","Agroindustrial Mendoza","Bebidas del Valle","Qu\u00edmica Industrial"];
    var products=["Tomates","Naranjas","Manzanas","Leche","Queso","Carne Vacuna","Pollo","Arroz","Fideos","Aceite","Vino Malbec","Cerveza","Agua Mineral","Yogurt","Pan"];
    var containers=["TRLU1234567","TRLU2345678","TRLU3456789","TRLU4567890","TRLU5678901","TRLU6789012","TRLU7890123","TRLU8901234","TRLU9012345","MSKU1122334","CSLU5566778","HLBU9988776"];
    var locations=["Galp\u00f3n A-01","Galp\u00f3n A-02","Galp\u00f3n B-01","Galp\u00f3n B-02","C\u00e1mara Fr\u00eda 1","C\u00e1mara Fr\u00eda 2","Patio Exterior","Zona de Despacho"];
    var operators=["Juan P\u00e9rez","Mar\u00eda Gonz\u00e1lez","Carlos L\u00f3pez","Ana Rodr\u00edguez","Pedro Mart\u00ednez"];
    function ri(a){return a[Math.floor(Math.random()*a.length)];}
    function ri2(a,n){var r=[];for(var i=0;i<n;i++)r.push(ri(a));return r;}
    function ds(ago){return new Date(Date.now()-ago*86400000).toISOString();}

    // Seed inventory (correct field names)
    var inv=[];
    for(var i=0;i<45;i++){
      var pl=Math.floor(Math.random()*120)+1;
      var bx=pl*(Math.floor(Math.random()*20)+5);
      inv.push({
        id:"inv-"+(1000+i),
        contenedor:ri(containers),
        cliente:ri(clients),
        producto:ri(products),
        lote:"LOT-"+String(Math.floor(Math.random()*900)+100),
        pallets:pl,
        cajas:bx,
        kilos:bx*(Math.floor(Math.random()*15)+2),
        estado:ri(["DISPONIBLE","RESERVADO","EN_TRANSITO","PENDIENTE"]),
        ubicacion:ri(locations),
        fechaIngreso:ds(Math.floor(Math.random()*60)),
        observaciones:"",
        temperatura:(Math.random()*12-2).toFixed(1),
        numeroCliente:String(Math.floor(Math.random()*50000)+10000)
      });
    }
    localStorage.setItem("digicraft_inventory_cache_v1",JSON.stringify(inv));

    // Seed orders (correct format with items[] and reservedItems[])
    var estados=["PENDIENTE","CONFIRMADO","DESPACHADO","CANCELADO"];
    var orders=[];
    for(var j=0;j<25;j++){
      var cl=ri(clients);
      var pr=ri(products);
      var ct=ri(containers);
      var pl2=Math.floor(Math.random()*20)+1;
      var bx2=pl2*(Math.floor(Math.random()*10)+3);
      var kg2=bx2*(Math.floor(Math.random()*15)+2);
      var itemObj={inventoryId:"inv-"+(Math.floor(Math.random()*45)+1000),producto:pr,contenedor:ct,lote:"LOT-"+String(Math.floor(Math.random()*900)+100),cliente:cl,pallets:pl2,cajas:bx2,kilos:kg2};
      var resObj={inventoryId:itemObj.inventoryId,palletsReserved:pl2,cajasReserved:bx2,kilosReserved:kg2,contenedor:ct,producto:pr,numeroCliente:String(Math.floor(Math.random()*50000)+10000),lote:itemObj.lote};
      orders.push({
        id:"ped-"+String(3000+j),
        numero:"PED-"+String(j+1).padStart(4,"0"),
        cliente:cl,
        estado:ri(estados),
        items:[itemObj],
        reservedItems: j<15?[resObj]:[],
        observaciones:"",
        operador:ri(operators),
        archivosAdjuntos:[],
        createdAt:ds(Math.floor(Math.random()*45)),
        updatedAt:ds(Math.floor(Math.random()*10))
      });
    }
    localStorage.setItem("digicraft_orders_v2",JSON.stringify(orders));

    // Seed activity
    var actTypes=["INGRESO","EGRESO","MOVIMIENTO","CONTROL_TEMPERATURA","AUDITORIA","DESPACHO"];
    var activity=[];
    for(var k=0;k<80;k++){
      activity.push({
        id:"act-"+(5000+k),
        type:ri(actTypes),
        description:"Operaci\u00f3n registrada - "+ri(clients),
        operator:ri(operators),
        timestamp:ds(Math.floor(Math.random()*30)+Math.random()),
        details:{}
      });
    }
    activity.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});
    localStorage.setItem("digicraft_activity_cache_v1",JSON.stringify(activity));

    // Seed audit log
    var audActions=["CREATE","UPDATE","DELETE","LOGIN","VIEW","EXPORT"];
    var audit=[];
    for(var m=0;m<50;m++){
      audit.push({id:"log-"+(7000+m),action:ri(audActions),user:ri(operators),timestamp:ds(Math.floor(Math.random()*20)+Math.random()),details:{entity:"inventory",entityId:"inv-"+(Math.floor(Math.random()*45)+1000)}});
    }
    audit.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});
    localStorage.setItem("digicraft_audit_log_v1",JSON.stringify(audit.slice(0,500)));

    // Seed temperature
    var temp=[];
    for(var n=0;n<48;n++){
      temp.push({id:"t-"+n,location:ri(locations),temperature:(Math.random()*12-2).toFixed(1),humidity:(Math.random()*40+50).toFixed(1),timestamp:new Date(Date.now()-n*1800000).toISOString(),status:Math.random()>0.15?"Normal":"Alerta"});
    }
    localStorage.setItem("temp-monitor-data",JSON.stringify(temp));

    localStorage.setItem("digicraft_seeded_v2","true");
  }
})();
</script>
