<script>
(function(){
  // ===== AUTO-LOGIN BYPASS =====
  localStorage.setItem("digicraft_session", "admin_default");
  var users = JSON.parse(localStorage.getItem("digicraft_users") || "[]");
  var adminExists = users.some(function(u){ return u.id === "admin_default"; });
  if (!adminExists) {
    users.push({
      id: "admin_default", username: "admin", password: "admin123",
      displayName: "Administrador", role: "ADMIN",
      createdAt: new Date().toISOString()
    });
    localStorage.setItem("digicraft_users", JSON.stringify(users));
  }
  localStorage.setItem("digicraft_operator_name", "Administrador");

  // ===== SEED RANDOM DATA =====
  if (!localStorage.getItem("digicraft_seeded")) {
    var clients = ["Transportes R\u00e1pidos S.A.","Log\u00edstica del Sur","Alimentos del Litoral","Fr\u00edos Patag\u00f3nicos","Distribuidora Nacional","Cereales del Norte","Exportadora Premium","Agroindustrial Mendoza","Bebidas del Valle","Qu\u00edmica Industrial"];
    var products = ["Tomates","Naranjas","Manzanas","Leche","Queso","Carne Vacuna","Pollo","Arroz","Fideos","Aceite","Vino Malbec","Cerveza","Agua Mineral","Yogurt","Pan"];
    var locations = ["Galp\u00f3n A-01","Galp\u00f3n A-02","Galp\u00f3n B-01","Galp\u00f3n B-02","C\u00e1mara Fr\u00eda 1","C\u00e1mara Fr\u00eda 2","Patio Exterior","Zona de Despacho"];
    var statuses = ["En Stock","Reservado","En Tr\u00e1nsito","Pendiente Ingreso"];
    var operators = ["Juan P\u00e9rez","Mar\u00eda Gonz\u00e1lez","Carlos L\u00f3pez","Ana Rodr\u00edguez","Pedro Mart\u00ednez"];

    // Seed inventory
    var inventory = [];
    for (var i = 0; i < 45; i++) {
      var cl = clients[Math.floor(Math.random()*clients.length)];
      var pr = products[Math.floor(Math.random()*products.length)];
      var loc = locations[Math.floor(Math.random()*locations.length)];
      var st = statuses[Math.floor(Math.random()*statuses.length)];
      var pallets = Math.floor(Math.random()*120)+1;
      var boxes = pallets * (Math.floor(Math.random()*20)+5);
      var kilos = boxes * (Math.floor(Math.random()*15)+2);
      var daysAgo = Math.floor(Math.random()*60);
      inventory.push({
        id: "INV-"+String(1000+i),
        containerCode: "CTR-"+String(200+i),
        clientName: cl,
        productName: pr,
        location: loc,
        status: st,
        palletCount: pallets,
        boxCount: boxes,
        kilos: kilos,
        entryDate: new Date(Date.now()-daysAgo*86400000).toISOString(),
        notes: ""
      });
    }
    localStorage.setItem("digicraft_inventory_cache_v1", JSON.stringify(inventory));

    // Seed orders
    var orderStatuses = ["Pendiente","En Proceso","Completado","Cancelado"];
    var orders = [];
    for (var j = 0; j < 30; j++) {
      var cl2 = clients[Math.floor(Math.random()*clients.length)];
      var pr2 = products[Math.floor(Math.random()*products.length)];
      var os = orderStatuses[Math.floor(Math.random()*orderStatuses.length)];
      var daysAgo2 = Math.floor(Math.random()*45);
      orders.push({
        id: "ORD-"+String(3000+j),
        clientName: cl2,
        productName: pr2,
        quantity: Math.floor(Math.random()*500)+10,
        status: os,
        createdAt: new Date(Date.now()-daysAgo2*86400000).toISOString(),
        operator: operators[Math.floor(Math.random()*operators.length)],
        destination: "Destino " + String(Math.floor(Math.random()*50)+1),
        notes: ""
      });
    }
    localStorage.setItem("digicraft_orders_v2", JSON.stringify(orders));

    // Seed activity
    var activityTypes = ["Ingreso","Egreso","Movimiento","Control Temperatura","Auditor\u00eda","Despacho"];
    var activity = [];
    for (var k = 0; k < 80; k++) {
      var daysAgo3 = Math.floor(Math.random()*30);
      var hoursAgo = Math.floor(Math.random()*24);
      activity.push({
        id: "ACT-"+String(5000+k),
        type: activityTypes[Math.floor(Math.random()*activityTypes.length)],
        description: "Operaci\u00f3n registrada - " + clients[Math.floor(Math.random()*clients.length)],
        operator: operators[Math.floor(Math.random()*operators.length)],
        timestamp: new Date(Date.now()-daysAgo3*86400000-hoursAgo*3600000).toISOString(),
        details: {}
      });
    }
    activity.sort(function(a,b){ return new Date(b.timestamp)-new Date(a.timestamp); });
    localStorage.setItem("digicraft_activity_cache_v1", JSON.stringify(activity));

    // Seed audit log
    var auditActions = ["CREATE","UPDATE","DELETE","LOGIN","VIEW","EXPORT"];
    var auditLog = [];
    for (var m = 0; m < 50; m++) {
      var daysAgo4 = Math.floor(Math.random()*20);
      auditLog.push({
        id: "LOG-"+String(7000+m),
        action: auditActions[Math.floor(Math.random()*auditActions.length)],
        user: operators[Math.floor(Math.random()*operators.length)],
        timestamp: new Date(Date.now()-daysAgo4*86400000).toISOString(),
        details: { entity: "inventory", entityId: "INV-"+String(Math.floor(Math.random()*45)+1000) }
      });
    }
    auditLog.sort(function(a,b){ return new Date(b.timestamp)-new Date(a.timestamp); });
    localStorage.setItem("digicraft_audit_log_v1", JSON.stringify(auditLog.slice(0,500)));

    // Seed temperature data
    var tempData = [];
    for (var n = 0; n < 48; n++) {
      tempData.push({
        id: "TEMP-"+n,
        location: locations[Math.floor(Math.random()*locations.length)],
        temperature: (Math.random()*12-2).toFixed(1),
        humidity: (Math.random()*40+50).toFixed(1),
        timestamp: new Date(Date.now()-n*1800000).toISOString(),
        status: Math.random()>0.15 ? "Normal" : "Alerta"
      });
    }
    localStorage.setItem("temp-monitor-data", JSON.stringify(tempData));

    localStorage.setItem("digicraft_seeded", "true");
  }
})();
</script>
